<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
<title>RM prep agent AWS service architecture</title>
<desc>A local Streamlit app with an in-process curation and aggregation tool calls into AWS: Amazon Bedrock AgentCore Runtime hosts the Summarizer, Critique, and Revision Strands agents, which call Amazon Bedrock for foundation model inference, use AgentCore Memory to hold session state across the banker's control-loop iterations, and send logs and traces to CloudWatch.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="600" fill="#FFFFFF"/>

<rect x="55" y="40" width="560" height="140" rx="16" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<text x="75" y="62" font-size="14" font-weight="600" fill="#2C2C2A">Local machine</text>
<text x="75" y="78" font-size="12" fill="#5F5E5A">Prototype demo environment</text>

<rect x="85" y="95" width="240" height="65" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text x="205" y="123" text-anchor="middle" font-size="14" font-weight="600" fill="#042C53">Streamlit UI</text>
<text x="205" y="141" text-anchor="middle" font-size="12" fill="#0C447C">Upload + review + controls</text>

<rect x="345" y="95" width="240" height="65" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="465" y="123" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Curation &amp; aggregation</text>
<text x="465" y="141" text-anchor="middle" font-size="12" fill="#5F5E5A">In-process pandas step</text>

<line x1="325" y1="127" x2="343" y2="127" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="335" y1="180" x2="335" y2="208" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="345" y="198" font-size="12" fill="#5F5E5A">AgentCore invoke</text>

<rect x="55" y="210" width="560" height="335" rx="16" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<text x="75" y="232" font-size="14" font-weight="600" fill="#2C2C2A">AWS</text>
<text x="75" y="248" font-size="12" fill="#5F5E5A">Amazon Bedrock AgentCore</text>

<rect x="75" y="265" width="540" height="170" rx="16" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<text x="95" y="287" font-size="14" font-weight="600" fill="#2C2C2A">AgentCore Runtime</text>
<text x="95" y="303" font-size="12" fill="#5F5E5A">Hosts orchestrator + agents</text>

<rect x="95" y="315" width="150" height="90" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="170" y="356" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Summarizer</text>
<text x="170" y="374" text-anchor="middle" font-size="12" fill="#3C3489">Drafts insight</text>

<rect x="265" y="315" width="150" height="90" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="340" y="356" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Critique</text>
<text x="340" y="374" text-anchor="middle" font-size="12" fill="#3C3489">Flags gaps</text>

<rect x="435" y="315" width="150" height="90" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
