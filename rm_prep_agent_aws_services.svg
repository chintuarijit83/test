<text x="515" y="503" text-anchor="middle" font-size="12" fill="#5F5E5A">Logs &amp; traces</text>

<rect x="55" y="560" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#378ADD"/>
<text x="72" y="570" font-size="12" fill="#5F5E5A">Interface</text>
<rect x="170" y="560" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#888780"/>
<text x="187" y="570" font-size="12" fill="#5F5E5A">Deterministic / support</text>
<rect x="390" y="560" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="407" y="570" font-size="12" fill="#5F5E5A">Amazon Bedrock service</text>
</svg>
