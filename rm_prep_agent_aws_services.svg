<text x="510" y="374" text-anchor="middle" font-size="12" fill="#3C3489">Closes gaps</text>

<line x1="245" y1="360" x2="263" y2="360" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="415" y1="360" x2="433" y2="360" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="155" y1="435" x2="155" y2="453" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="335" y1="435" x2="335" y2="453" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="515" y1="435" x2="515" y2="453" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

